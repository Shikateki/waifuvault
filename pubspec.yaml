name: waifuvault
description: A futuristic private anime gallery for images and short videos.
publish_to: 'none'

version: 2.0.7+37

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  video_player: ^2.9.2
  shared_preferences: ^2.3.2
  palette_generator: ^0.3.3+4
  path_provider: ^2.1.4
  path: ^1.9.0
  video_thumbnail: ^0.5.3
  permission_handler: ^11.3.1
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/waifuvault_icon.png
  adaptive_icon_background: '#080A14'
  adaptive_icon_foreground: assets/branding/waifuvault_icon_foreground.png
  min_sdk_android: 21

flutter_native_splash:
  color: '#080A14'
  image: assets/branding/waifuvault_splash.png
  android: true
  ios: false
  fullscreen: true
  android_12:
    color: '#080A14'
    image: assets/branding/waifuvault_icon_foreground.png
